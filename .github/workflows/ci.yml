name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck on DUMB scripts
        run: |
          shopt -s extglob
          shellcheck --severity=warning "Scripts/Mount Script (DUMB)" \
                                       "Scripts/Symlink Cleanup (DUMB)" \
                                       "Scripts/Plex Mount Monitor (DUMB)" \
                                       "Scripts/Array Stop Script (DUMB)"

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run bats tests
        run: bats tests/
